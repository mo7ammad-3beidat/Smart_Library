<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/book.png">
</head>
<body>

    <div class="container">

        <header class="top-header">
            <div class="header-top-row">
                <h2 class="logo">Smart Library</h2>

                <div class="lang-switch">
                    <button onclick="switchToArabic()">العربية</button>
                </div>
            </div>

            <div class="header-text">
                <h1>Library Book Loan & Inventory System</h1>
                <p>Manage books, loans, returns, and reports</p>
            </div>
        </header>

        <div class="grid">
            <section class="card">
                <h2>Add Book</h2>
                <input id="bookId" placeholder="Book ID">
                <input id="bookTitle" placeholder="Book Title">
                <input id="bookCopies" type="number" placeholder="Total Copies">
                <button onclick="addBook()">Add Book</button>
            </section>

            <section class="card">
                <h2>Loan / Return</h2>
                <input id="loanId" placeholder="Book ID">
                <div class="button-group">
                    <button onclick="loanBook()">Loan Book</button>
                    <button class="secondary" onclick="returnBook()">Return Book</button>
                </div>
            </section>

            <section class="card">
                <h2>Reports</h2>
                <div class="button-group">
                    <button onclick="generateReport()">Inventory Report</button>
                    <button class="secondary" onclick="viewLastReturned()">Last Returned</button>
                    <button class="danger" onclick="deleteAllBooks()">Delete All Books</button>
                </div>
            </section>
        </div>

        <section id="report" class="report-box"></section>

        <footer class="footer">
            <p>© 2026 All Rights Reserved | Developed by MOHAMMAD SALAMEH OBEIDAT</p>

            <div class="social-icons">
                <a href="https://github.com/mo7ammad-3beidat" target="_blank" rel="noopener noreferrer">
                    <img src="assets/github.png" alt="GitHub">
                </a>
                <a href="https://www.linkedin.com/in/mo7-3beidat/" target="_blank" rel="noopener noreferrer">
                    <img src="assets/linkedin.png" alt="LinkedIn">
                </a>
            </div>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
