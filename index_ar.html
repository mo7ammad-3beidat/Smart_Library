<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المكتبة</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/book.png">
</head>
<body>

    <div class="container">

        <header class="top-header">
            <div class="header-top-row">
                <h2 class="logo">المكتبة الذكية</h2>

                <div class="lang-switch">
                    <button onclick="switchToEnglish()">English</button>
                </div>
            </div>

            <div class="header-text">
                <h1>نظام إدارة إعارة الكتب والمخزون</h1>
                <p>إدارة الكتب والإعارة والإرجاع والتقارير</p>
            </div>
        </header>

        <div class="grid">
            <section class="card">
                <h2>إضافة كتاب</h2>
                <input id="bookId" placeholder="رقم الكتاب">
                <input id="bookTitle" placeholder="اسم الكتاب">
                <input id="bookCopies" type="number" placeholder="عدد النسخ">
                <button onclick="addBook()">إضافة كتاب</button>
            </section>

            <section class="card">
                <h2>إعارة / إرجاع</h2>
                <input id="loanId" placeholder="رقم الكتاب">
                <div class="button-group">
                    <button onclick="loanBook()">إعارة كتاب</button>
                    <button class="secondary" onclick="returnBook()">إرجاع كتاب</button>
                </div>
            </section>

            <section class="card">
                <h2>التقارير</h2>
                <div class="button-group">
                    <button onclick="generateReport()">تقرير المخزون</button>
                    <button class="secondary" onclick="viewLastReturned()">آخر كتاب مُعاد</button>
                    <button class="danger" onclick="deleteAllBooks()">حذف جميع الكتب</button>
                </div>
            </section>
        </div>

        <section id="report" class="report-box"></section>

        <footer class="footer">
            <p>© 2026 جميع الحقوق محفوظة | تطوير محمد سلامة عبيدات</p>

            <div class="social-icons">
                <a href="https://github.com/mo7ammad-3beidat" target="_blank" rel="noopener noreferrer">
                    <img src="assets/github.png" alt="GitHub">
                </a>
                <a href="https://www.linkedin.com/in/mo7-3beidat/" target="_blank" rel="noopener noreferrer">
                    <img src="assets/linkedin.png" alt="LinkedIn">
                </a>
            </div>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
